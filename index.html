<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workplace Principles Cards</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom font */
        body {
            font-family: 'Inter', sans-serif;
            /* Applying the neutral brand background color */
            background-color: #F2F2F2;
            padding: 2rem;
        }
    </style>
</head>
<body class="antialiased">

    <!--
    Main container for the three cards.
    The outer container now uses bg-white for better contrast against the #F2F2F2 body background.
    -->
    <div class="flex flex-col md:flex-row gap-6 justify-center p-6 rounded-2xl shadow-xl max-w-6xl mx-auto bg-white">

        <!-- Card 1: Modern Awards - Primary Purple Theme (#532A8C, #C3ACE8) -->
        <div class="flex-1 bg-white p-4 rounded-xl shadow-md transition-all duration-300 hover:shadow-lg text-center border-t-4 border-[#C3ACE8]">
            <!-- Fallback removed -->
            <img src="Healthcare Team.png"
                 alt="Healthcare team working together"
                 class="w-full h-auto object-cover rounded-lg mb-3 border-4 border-[#C3ACE8]">
            <p class="mt-2 text-gray-700">
                <!-- Text color changed to primary dark purple #532A8C -->
                <strong class="text-lg text-[#532A8C]">Modern Awards in Practice:</strong> Supporting fair conditions across healthcare roles.
            </p>
        </div>

        <!-- Card 2: Fair Work Principles - Primary Green Theme (#7ABF49, #96BF78) -->
        <div class="flex-1 bg-white p-4 rounded-xl shadow-md transition-all duration-300 hover:shadow-lg text-center border-t-4 border-[#96BF78]">
            <!-- Fallback removed -->
            <img src="Fair Work.png"
                 alt="Fair work documents and scales"
                 class="w-full h-auto object-cover rounded-lg mb-3 border-4 border-[#96BF78]">
            <p class="mt-2 text-gray-700">
                <!-- Text color changed to primary green #7ABF49 -->
                <strong class="text-lg text-[#7ABF49]">Fair Work Principles:</strong> Legal protection for all employees.
            </p>
        </div>

        <!-- Card 3: Diversity and Inclusion - Secondary Purple Theme (#532A8C, #9D8ABB) -->
        <div class="flex-1 bg-white p-4 rounded-xl shadow-md transition-all duration-300 hover:shadow-lg text-center border-t-4 border-[#9D8ABB]">
            <!-- Fallback removed -->
            <img src="Diversity and Inclusion.png"
                 alt="Diverse health workers in discussion"
                 class="w-full h-auto object-cover rounded-lg mb-3 border-4 border-[#9D8ABB]">
            <p class="mt-2 text-gray-700">
                <!-- Text updated to "Diversity and Inclusion" -->
                <strong class="text-lg text-[#532A8C]">Diversity and Inclusion:</strong> Respect and communication in the workplace.
            </p>
        </div>

    </div>
</body>
</html>
